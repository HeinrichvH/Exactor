version: 1

memory:
  backend: file
  path: .exactor/session

workers:
  research:
    command: "research {query}"
    description: "Web research via Mistral Vibe"
    timeout: 240               # inner timeout; set Claude Code hook timeout higher (e.g. 300)

intercept:
  - tool: WebSearch
    route_to: research
  - tool: WebFetch
    route_to: research

guards:
  max_raw_output_lines: 80
