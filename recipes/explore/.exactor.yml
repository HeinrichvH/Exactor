#
# Exactor recipe: Goose (Mistral Devstral) as a code-exploration worker.
#
# Self-contained: explore.py + the two Goose recipes (main + verifier)
# all live next to this file. Exactor exposes EXACTOR_CONFIG_DIR = the
# directory of this file, and explore.py resolves its peer recipes
# relative to its own location.
#
# Requirements:
#   - `goose` on PATH (github.com/block/goose)
#   - MISTRAL_API_KEY in env (or in ~/.vibe/.env — we share Mistral with the
#     vibe recipe)
#   - ripgrep (`rg`) in the repo being explored, for the subagent's shell
#     tool to use
#   - python3 (stdlib only)
#
# The worker inherits Claude Code's cwd (no `cwd:` field below), so the
# `git rev-parse --show-toplevel` inside explore.py resolves to the
# project the user is working in — not Exactor itself.
#

version: 1
mode: strict

cache:
  path: .exactor/cache.db
  default_ttl_hours: 24

workers:
  explore:
    command: python3
    args:
      - "${EXACTOR_CONFIG_DIR}/explore.py"
      - "{query}"
    stdin: devnull
    timeout: 600          # inner; set Claude Code hook timeout equal or higher
    cache: false          # code state changes under us; stale reports are
                          # worse than re-running the subagent
    mode: loose           # fall back to raw Grep/Glob if goose fails, so a
                          # bad subagent day doesn't block the session

intercept:
  - tool: Grep
    query_template: "find '{pattern}' in path '{path}' (glob='{glob}', type='{type}')"
    route_to: explore
    # Skip 1-3 character patterns — sigils/typos, direct Grep is cheaper.
    unless_match: "^find '.{1,3}' in"

  - tool: Glob
    query_template: "list files matching '{pattern}' under '{path}'"
    route_to: explore

  # Bash-side filesystem search leaks past the Grep/Glob intercepts — session
  # analysis showed ~8.8k Bash calls leading with rg/grep/find/fd over the
  # last period, ~3x the Grep volume. Route them to the same worker.
  #
  # `match` fires only when the command STARTS with a search tool (optionally
  # preceded by `VAR=val` env assignments). That excludes the common
  # `kubectl ... | grep foo` / `fj ... | grep bar` case where grep is just a
  # filter on another command's output — the explorer can't reproduce those
  # and would hallucinate. `ls` is deliberately NOT in the list: it's too
  # often a one-shot sanity check and intercepting it burns latency for no
  # win.
  - tool: Bash
    query_field: command
    match: "^(?:[A-Za-z_][A-Za-z0-9_]*=\\S+\\s+)*(grep|egrep|fgrep|rg|find|fd|ag|ack)\\b"
    # Skip `find <path>` with no expression — that's a bare directory tree
    # listing, not a search. (Narrow-pattern skips for grep/rg were tried and
    # over-matched on flags like `-n`; the data showed <0.1% of calls would
    # benefit anyway, so we don't bother.)
    unless_match: "^find\\s+\\S+\\s*$"
    route_to: explore
