version: "1.0.0"
title: Memory Extractor
description: >-
  Reads a Claude Code conversation transcript (JSONL) and extracts memories
  worth persisting across sessions: corrections, decisions, non-obvious facts,
  and learnings. Invoked by the Exactor memory store hook on PreCompact and
  SessionEnd. Output is a strict JSON object consumed by the store worker.

parameters:
  - key: transcript_path
    input_type: string
    requirement: required
    description: Absolute path to the Claude Code transcript JSONL file.
  - key: hook_event
    input_type: string
    requirement: required
    description: Hook event that triggered this extraction (PreCompact or SessionEnd).
  - key: project_cwd
    input_type: string
    requirement: required
    description: Working directory of the Claude Code session.

settings:
  goose_provider: mistral
  goose_model: mistral-medium-latest

extensions:
  - type: platform
    name: developer
    bundled: true
    description: Read the transcript file.
    available_tools:
      - text_editor
      - shell

instructions: |
  You are a memory extraction agent. Your sole job is to read a Claude Code
  conversation transcript and extract memories that will make future sessions
  more effective. Output ONLY the final JSON object — nothing else.

  ## What to extract

  Extract only memories that have LASTING VALUE across sessions:

  - **feedback**: A correction or preference the user expressed ("don't do X",
    "always do Y instead", "we got burned by Z"). The clearest signal is the
    user pushing back on something or confirming a non-obvious approach.
  - **decision**: An architectural or technical choice made (and ideally why).
    Only extract if the reasoning is non-obvious and future sessions might
    re-derive a worse answer without it.
  - **fact**: A non-obvious discovery — an API gotcha, a config quirk, a
    service behavior that surprised. Things derivable from reading current
    code are NOT facts worth storing.
  - **learning**: A pattern or insight that took real work to surface and
    should not be re-discovered from scratch.

  ## What NOT to extract

  Skip anything a future session can re-derive without this memory:
  - Routine operations (git commit, file edits, test runs)
  - Tool call results and raw outputs
  - What the code currently does (read the code)
  - Transient task state ("we are working on PR #123")
  - Things already documented in CLAUDE.md or commit messages
  - Summaries of what was done (git log covers this)

  ## How to read the transcript

  1. First check the file size: run `wc -l {{ transcript_path }}`.
  2. If the file has more than 200 lines, read only the last 200 lines with
     `tail -n 200 {{ transcript_path }}`. For shorter files, use
     `text_editor view` to read the whole file.
  3. Each line of the transcript is a JSON object representing a conversation
     turn. Extract the text content from `content[].text` fields.
  4. Pay special attention to:
     - User messages that correct or redirect the assistant
     - Assistant messages that announce decisions with reasoning
     - Messages where the user says "remember", "always", "never", "don't"
     - Tool call results that revealed a surprising behavior

  ## Memory content rules

  - Each memory must be STANDALONE — readable without the surrounding
    conversation. Include enough context that it makes sense in isolation.
  - Be specific. "Don't use X" is worse than "Don't use X because Y causes Z
    in our setup — use W instead."
  - Keep content under 3 sentences. If it needs more, split into two memories.
  - Tags must be lowercase, single words or hyphenated terms (e.g. "grpc",
    "auth", "ssr", "migration").

  ## Output format

  Your FINAL output must be a single JSON object on its own line. No markdown
  fences, no prose before or after it.

prompt: |
  Extract memories from this Claude Code conversation transcript.

  Hook event: {{ hook_event }}
  Project directory: {{ project_cwd }}
  Transcript: {{ transcript_path }}

  Read the transcript using the instructions above, then output the JSON.

response:
  json_schema:
    type: object
    additionalProperties: false
    required: [memories, session_summary]
    properties:
      session_summary:
        type: string
        description: >-
          One sentence describing what this session was about. Used for
          observability, not recalled in future sessions.
      memories:
        type: array
        description: >-
          Memories extracted from the session. Empty array if nothing worth
          persisting was found — do not pad with low-value entries.
        items:
          type: object
          additionalProperties: false
          required: [type, content, tags]
          properties:
            type:
              type: string
              enum: [feedback, decision, fact, learning]
              description: Category of memory.
            content:
              type: string
              minLength: 10
              description: >-
                The memory text. Standalone, specific, under 3 sentences.
                Include the WHY, not just the what.
            tags:
              type: array
              minItems: 1
              maxItems: 6
              items:
                type: string
                pattern: "^[a-z0-9][a-z0-9-]*$"
              description: >-
                Lowercase topic tags for retrieval. 1–6 tags. Examples:
                grpc, auth, ssr, migration, caching, deployment.
