version: 1

# Failure policy.
#   strict — worker failure blocks the raw tool (default). The model sees
#            an "[exactor] worker failed" message and can decide how to react.
#   loose  — worker failure allows the raw tool through as a fallback. Useful
#            when you want routing as a preference, not a hard constraint.
# Override per-worker with workers.<name>.mode.
mode: strict

# Working-memory cache (SQLite-backed, stdlib only).
# Opt-in per worker via `cache: true`. TTL configurable per worker.
# `path` defaults to $XDG_CACHE_HOME/exactor/cache.db (i.e. ~/.cache/exactor/cache.db).
# Override here for a project-local DB.
cache:
  default_ttl_hours: 24

# JSON-lines log of every hook fire, route decision, and worker outcome.
# Default: $XDG_STATE_HOME/exactor/exactor.log (i.e. ~/.local/state/exactor/exactor.log).
# Rotated at 5 MiB × 3 files. Inspect with `exactor log tail` or `jq`.
# `EXACTOR_LOG_LEVEL=debug` in env mirrors to stderr for `claude --debug`.
logging:
  level: INFO

# Workers are plain shell commands. {query} is replaced with the intercepted input.
# Bring your own — these are examples. Replace with whatever lives in your PATH.
workers:
  research:
    command: "research {query}"
    description: "Web research — requires a `research` tool in your PATH"
    timeout: 240               # inner timeout in seconds; keep < outer Claude Code hook timeout
    cache: true                # identical queries reused within cache_ttl_hours
  explore:
    command: "explore {query}"
    description: "Codebase exploration — requires an `explore` tool in your PATH"
    timeout: 60

# Intercept rules — matched top to bottom, first match wins.
#
# query_field names the tool_input key that holds the relevant string (Exactor
# doesn't hardcode any tool's schema). It's also the subject `match:` tests
# against, so regex + query stay consistent. Omit it to pass str(tool_input).
intercept:
  # Route web searches to your researcher
  - tool: WebSearch
    query_field: query
    route_to: research

  # Route WebFetch to your researcher
  - tool: WebFetch
    query_field: url
    route_to: research

  # Route Bash grep/find/rg to your explorer
  # unless: the command targets a single known file — cat/head/tail/less on
  # an absolute path, or a narrow grep/rg on a single absolute path (no -r,
  # no globs, no multi-file lists). Those are "I know the file, give me raw
  # bytes" calls, not exploration.
  - tool: Bash
    query_field: command
    match: "^(grep|rg|find)\\b"
    route_to: explore
    unless: single_file_absolute_path

# Guards — applied in post-tool hook
guards:
  max_raw_output_lines: 80
  warn_on_bypass: true

# Memory adapter — optional. Exactor doesn't ship a backend; you bring one
# (Mem0, a flat JSON file, your own service, whatever) and wire it as a worker.
#
# Recall: runs on UserPromptSubmit. Worker stdout is injected as
#   additionalContext into the model's conversation. {query} = user prompt.
# Store: runs on the events you list here — Claude Code is the source of
#   truth for which events exist, exactor does not allowlist. The full hook
#   payload is piped to the worker on stdin verbatim; the worker reads
#   transcript_path / hook_event_name / session_id and decides what to
#   persist. Fire-and-forget — worker stdout is ignored.
#
# memory:
#   recall:
#     event: UserPromptSubmit
#     worker:
#       command: "your-memory-recall {query}"
#       timeout: 10                  # keep short — runs on every prompt
#   store:
#     events: [Stop, PreCompact, SessionEnd]
#     worker:
#       command: "your-memory-store"
#       timeout: 30                  # PreCompact rescue can be slower
